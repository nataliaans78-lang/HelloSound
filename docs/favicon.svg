<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EchoGlow icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b15"/>
      <stop offset="1" stop-color="#131026"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cf7ff"/>
      <stop offset="0.5" stop-color="#b388ff"/>
      <stop offset="1" stop-color="#7cf7ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#neon)" stroke-width="2.4" opacity="0.92" filter="url(#glow)"/>

  <g fill="url(#neon)" filter="url(#glow)">
    <rect x="23" y="30" width="4.8" height="10" rx="2.4"/>
    <rect x="29.6" y="25.5" width="4.8" height="19" rx="2.4"/>
    <rect x="36.2" y="28" width="4.8" height="14" rx="2.4"/>
  </g>
</svg>
