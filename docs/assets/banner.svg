<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="EchoGlow banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06060b"/>
      <stop offset="0.55" stop-color="#0b0613"/>
      <stop offset="1" stop-color="#06060b"/>
    </linearGradient>

    <linearGradient id="neonStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#70f8ff"/>
      <stop offset="0.45" stop-color="#2e7bff"/>
      <stop offset="0.75" stop-color="#b54dff"/>
      <stop offset="1" stop-color="#ff7af6"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67f8ff"/>
      <stop offset="0.5" stop-color="#3a6bff"/>
      <stop offset="1" stop-color="#cf63ff"/>
    </linearGradient>

    <filter id="miniGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="waveGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 700 64px/1.1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        letter-spacing: .6px;
        filter: drop-shadow(0 0 3px rgba(124,247,255,0.15));
        animation: titlePulse 5.6s ease-in-out infinite;
      }

      @keyframes titlePulse {
        0%,100% {
          opacity: .96;
          filter: drop-shadow(0 0 3px rgba(124,247,255,0.12));
        }
        50% {
          opacity: 1;
          filter: drop-shadow(0 0 7px rgba(124,247,255,0.22));
        }
      }

      .sub {
        font: 500 20px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        opacity: .9;
        letter-spacing: .3px;
      }

      .wave {
        fill: none;
        stroke: url(#neonStroke);
        stroke-width: 2;
        stroke-linecap: round;
        opacity: .9;
      }

      @keyframes drift {
        0%   { transform: translateX(-10px); opacity: .48; }
        50%  { opacity: .98; }
        100% { transform: translateX(10px); opacity: .48; }
      }

      .w1 { animation: drift 4.4s infinite alternate; }
      .w2 { animation: drift 5s infinite alternate; }
      .w3 { animation: drift 5.8s infinite alternate; }

      .bar {
        fill: url(#neonStroke);
        transform-box: fill-box;
        transform-origin: center;
        filter: url(#miniGlow);
      }

      .b1 { animation: eq1 3.8s infinite ease-in-out; animation-delay: -0.0s; }
      .b2 { animation: eq2 4.0s infinite ease-in-out; animation-delay: -0.2s; }
      .b3 { animation: eq3 4.2s infinite ease-in-out; animation-delay: -0.4s; }
      .b4 { animation: eq4 4.4s infinite ease-in-out; animation-delay: -0.6s; }
      .b5 { animation: eq5 4.6s infinite ease-in-out; animation-delay: -0.8s; }
      .b6 { animation: eq6 4.4s infinite ease-in-out; animation-delay: -1.0s; }
      .b7 { animation: eq7 4.2s infinite ease-in-out; animation-delay: -0.8s; }
      .b8 { animation: eq8 4.0s infinite ease-in-out; animation-delay: -0.6s; }
      .b9 { animation: eq9 3.8s infinite ease-in-out; animation-delay: -0.4s; }

      @keyframes eq1 { 0%,100%{transform:scaleY(.96)} 50%{transform:scaleY(1.04)} }
      @keyframes eq2 { 0%,100%{transform:scaleY(.94)} 50%{transform:scaleY(1.08)} }
      @keyframes eq3 { 0%,100%{transform:scaleY(.92)} 50%{transform:scaleY(1.12)} }
      @keyframes eq4 { 0%,100%{transform:scaleY(.90)} 50%{transform:scaleY(1.16)} }
      @keyframes eq5 { 0%,100%{transform:scaleY(.88)} 50%{transform:scaleY(1.20)} }
      @keyframes eq6 { 0%,100%{transform:scaleY(.92)} 50%{transform:scaleY(1.10)} }
      @keyframes eq7 { 0%,100%{transform:scaleY(.88)} 50%{transform:scaleY(1.20)} }
      @keyframes eq8 { 0%,100%{transform:scaleY(.90)} 50%{transform:scaleY(1.16)} }
      @keyframes eq9 { 0%,100%{transform:scaleY(.92)} 50%{transform:scaleY(1.12)} }

      .spark  { animation: twinkle 2.8s ease-in-out infinite; }
      .spark2 { animation: twinkle 4.1s ease-in-out infinite; }
      .spark3 { animation: twinkle 3.5s ease-in-out infinite; }

      @keyframes twinkle {
        0%,100% { opacity: .16; transform: scale(.88); }
        50%     { opacity: .95; transform: scale(1.18); }
      }

      .s2  { animation-delay: -.9s; }
      .s4  { animation-delay: -.5s; }
      .s5  { animation-delay: -1.8s; }
      .s6  { animation-delay: -.7s; }
      .s7  { animation-delay: -1.1s; }
      .s9  { animation-delay: -1.6s; }
      .s10 { animation-delay: -.8s; }
      .s11 { animation-delay: -1.9s; }
      .s13 { animation-delay: -1.2s; }
      .s17 { animation-delay: -.45s; }
      .s18 { animation-delay: -1.05s; }
      .s20 { animation-delay: -.25s; }
      .s21 { animation-delay: -1.65s; }
      .s22 { animation-delay: -.95s; }
      .s23 { animation-delay: -1.25s; }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <g filter="url(#waveGlow)">
    <path class="wave w1" d="M80 210 C 170 170,260 250,350 210 S530 170,620 210 S800 250,890 210 S1070 170,1160 210"/>
    <path class="wave w2" d="M80 235 C 170 195,260 275,350 235 S530 195,620 235 S800 275,890 235 S1070 195,1160 235"/>
    <path class="wave w3" d="M80 185 C 170 145,260 225,350 185 S530 145,620 185 S800 225,890 185 S1070 145,1160 185"/>
  </g>

  <g transform="translate(920 20)">
    <ellipse cx="140" cy="130" rx="115" ry="108"
      fill="none" stroke="url(#ringGrad)" stroke-width="4"/>

    <ellipse cx="140" cy="130" rx="150" ry="48"
      fill="none" stroke="url(#neonStroke)" stroke-width="2"
      opacity=".3" transform="rotate(-18 140 130)"/>

    <g>
      <rect class="bar b1" x="50"  y="117" width="12" height="26" rx="6"/>
      <rect class="bar b2" x="71"  y="110" width="12" height="40" rx="6"/>
      <rect class="bar b3" x="92"  y="102" width="12" height="56" rx="6"/>
      <rect class="bar b4" x="113" y="89"  width="12" height="82" rx="6"/>
      <rect class="bar b5" x="134" y="73"  width="12" height="114" rx="6"/>
      <rect class="bar b6" x="155" y="89"  width="12" height="82" rx="6"/>
      <rect class="bar b7" x="176" y="102" width="12" height="56" rx="6"/>
      <rect class="bar b8" x="197" y="110" width="12" height="40" rx="6"/>
      <rect class="bar b9" x="218" y="117" width="12" height="26" rx="6"/>
    </g>

    <g id="particles">
      <g fill="#7cf7ff" filter="url(#miniGlow)">
        <circle class="spark2 s2"  cx="44"  cy="58"  r="2.1"/>
        <circle class="spark s4"   cx="78"  cy="82"  r="1.2"/>
        <circle class="spark2 s5"  cx="96"  cy="32"  r="1.4"/>
        <circle class="spark3 s6"  cx="110" cy="214" r="1.5"/>
        <circle class="spark s7"   cx="66"  cy="188" r="1.3"/>
        <circle class="spark3 s9"  cx="196" cy="24"  r="1.3"/>
        <circle class="spark s10"  cx="214" cy="198" r="1.8"/>
        <circle class="spark2 s11" cx="226" cy="46"  r="2.1"/>
        <circle class="spark s13"  cx="258" cy="138" r="1.2"/>
      </g>

      <g fill="#d97cff" filter="url(#miniGlow)">
        <circle class="spark2 s17" cx="36"  cy="150" r="1.3"/>
        <circle class="spark3 s18" cx="124" cy="40"  r="1.2"/>
        <circle class="spark2 s20" cx="182" cy="208" r="1.6"/>
        <circle class="spark3 s21" cx="204" cy="82"  r="1.5"/>
        <circle class="spark s22"  cx="236" cy="170" r="1.8"/>
        <circle class="spark2 s23" cx="240" cy="112" r="2.1"/>
      </g>
    </g>
  </g>

  <text x="90" y="125" fill="url(#neonStroke)" class="title">EchoGlow</text>
  <text x="92" y="162" fill="#e8e8ff" class="sub">
    Neon Audio Player • Drag &amp; Drop • Playlist • Equalizer
  </text>
</svg>